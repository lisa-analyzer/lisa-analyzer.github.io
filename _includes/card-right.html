<div class="card card-right">
  <div class="card-image">
    <img src="{{ site.baseurl }}/{{ include.image }}" alt="{{ include.alt }}" />
  </div>
  <div class="card-content">
    <span>{{ include.title }}</span>
    <p>{{ include.content }}</p>
    <a href="{{ include.link }}" class="btn">{{ include.link_text }}</a>
  </div>
</div>
